<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>雾霾天气探测系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <div class="label">当前位置</div>
        <div id="city-display" class="city-name">加载中...</div>
      </div>
      <div class="header-right">
        <button id="refresh-button" class="btn">刷新</button>
        <div id="date-display" class="date-label"></div>
      </div>
    </header>

    <main class="app-main">
      <section class="card card-weather">
        <div class="section-title">天气详情</div>
        <div class="weather-row">
          <div class="weather-large" id="condition-text">--</div>
          <div class="weather-values">
            <div>温度 <span id="temperature">--</span>℃</div>
            <div>体感 <span id="feels-like">--</span>℃</div>
            <div>湿度 <span id="humidity">--</span>%</div>
            <div>风况 <span id="wind">--</span>&nbsp</div>
          </div>
        </div>
        <div class="weather-extra">
          <div>日出 <span id="sunrise">--</span></div>
          <div>日落 <span id="sunset">--</span></div>
        </div>
      </section>

      <section class="card card-air">
        <div class="section-title">空气质量</div>
        <div class="air-grid">
          <div class="air-item">
            <div class="air-label">AQI</div>
            <div id="aqi-value" class="air-value">--</div>
          </div>
          <div class="air-item">
            <div class="air-label">PM2.5</div>
            <div id="pm25-value" class="air-value">--</div>
          </div>
          <div class="air-item">
            <div class="air-label">PM10</div>
            <div id="pm10-value" class="air-value">--</div>
          </div>
          <div class="air-item">
            <div class="air-label">等级</div>
            <div id="aqi-level" class="air-value">--</div>
          </div>
        </div>
      </section>

      <section class="card card-chart">
        <div class="section-title">温度 / 湿度趋势</div>
        <canvas id="trend-chart" width="360" height="220"></canvas>
      </section>

      <section class="card card-advice">
        <div class="section-title">出行建议</div>
        <div id="advice-text">正在加载建议...</div>
      </section>

      <section class="card card-input hidden" id="city-form-card">
        <div class="section-title">获取定位失败，请输入城市</div>
        <form id="city-form" class="city-form">
          <input id="city-input" type="text" placeholder="例如：北京" required />
          <button type="submit" class="btn btn-primary">保存城市</button>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
